<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #090909; 
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* 🔥 Video Player Animation Styles 🔥 */
  .video-loader {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
  }

  /* The Glowing Play Button */
  .play-button {
    position: relative;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #00f2ff, #0088ff);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.6), inset 0 0 10px rgba(255,255,255,0.5);
    animation: pulse-button 1.5s infinite alternate;
  }

  /* The Play Triangle */
  .play-button::after {
    content: '';
    display: block;
    margin-left: 5px; 
    width: 0;
    height: 0;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 18px solid #ffffff;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
  }

  /* Ripple Waves */
  .ripple {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #00f2ff;
    box-shadow: 0 0 15px #00f2ff;
    animation: ripple-out 2s cubic-bezier(0.21, 0.53, 0.56, 0.8) infinite;
  }

  .ripple:nth-child(2) { animation-delay: 0.6s; }
  .ripple:nth-child(3) { animation-delay: 1.2s; }

  /* 🔥 Bouncing Text Wave Effect 🔥 */
  .loading-text {
    display: flex;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00f2ff;
  }

  /* প্রতিটি অক্ষরের আলাদা এনিমেশন */
  .loading-text span {
    display: inline-block;
    animation: bounce-text 1.5s infinite ease-in-out;
    /* CSS ভেরিয়েবল দিয়ে সিরিয়ালি লাফানোর টাইম সেট করা হয়েছে */
    animation-delay: calc(0.08s * var(--i));
  }

  /* লেখার মাঝখানের স্পেস */
  .space {
    width: 10px;
  }

  /* --- Keyframes --- */
  @keyframes pulse-button {
    0% { transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
    100% { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 242, 255, 0.8); }
  }

  @keyframes ripple-out {
    0% { transform: scale(1); opacity: 1; border-width: 3px; }
    100% { transform: scale(2.5); opacity: 0; border-width: 0; }
  }

  /* টেক্সট বাউন্স এবং গ্লো এনিমেশন */
  @keyframes bounce-text {
    0%, 40%, 100% { 
      transform: translateY(0); 
      color: #00f2ff;
      text-shadow: none;
    }
    20% { 
      transform: translateY(-8px); /* উপরে লাফানো */
      color: #ffffff; /* লাফানোর সময় সাদা হবে */
      text-shadow: 0 0 15px #00f2ff, 0 0 25px #ff00ea; /* সুন্দর নিয়ন গ্লো */
    }
  }
</style>

    <div class="play-button"></div>
  </div>
  
  <!-- Wave Bouncing Text -->
  <div class="loading-text">
    <span style="--i:1">L</span>
    <span style="--i:2">O</span>

    <span style="--i:4">D</span>
